name: NautiHuskyTemp
options:
  bundleIdPrefix: net.botelle
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: TM63PG5C3F
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  NautiHuskyTemp-macOS:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - "Info-iOS.plist"
          - "Info-watchOS.plist"
          - "Entitlements-iOS.entitlements"
          - "Entitlements-watchOS.entitlements"
          - "WatchContentView.swift"
    info:
      path: Sources/Info-macOS.plist
      properties:
        CFBundleDisplayName: Nauti Husky
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        NSHumanReadableCopyright: "© Justin Botelle"
        NSLocationWhenInUseUsageDescription: "Used to find swim spots and water conditions near you."
    settings:
      base:
        PRODUCT_NAME: "Nauti Husky"
        PRODUCT_BUNDLE_IDENTIFIER: net.botelle.NautiHuskyTemp
        CODE_SIGN_ENTITLEMENTS: Sources/NautiHuskyTemp.entitlements
        ENABLE_HARDENED_RUNTIME: YES
  NautiHuskyTemp-iOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "Info-macOS.plist"
          - "Info-watchOS.plist"
          - "NautiHuskyTemp.entitlements"
          - "Entitlements-watchOS.entitlements"
          - "WatchContentView.swift"
    dependencies:
      - target: NautiHuskyTempWidget-iOS
        embed: true
    info:
      path: Sources/Info-iOS.plist
      properties:
        CFBundleDisplayName: Nauti Husky
        MinimumOSVersion: $(IPHONEOS_DEPLOYMENT_TARGET)
        NSLocationWhenInUseUsageDescription: "Used to find swim spots and water conditions near you."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_NAME: "Nauti Husky"
        # TestFlight ships under the HuskySwimTime App Store Connect record;
        # app group is group.org.botelle.SwimTime (aligned with the bundle id).
        PRODUCT_BUNDLE_IDENTIFIER: org.botelle.SwimTime
        PRODUCT_MODULE_NAME: NautiHuskyTemp
        TARGETED_DEVICE_FAMILY: "1,2"
        # group.org.botelle.SwimTime is assigned to this App ID in the portal
        # (one-time manual step — API-key cloud signing can't manage app groups,
        # only include already-assigned ones in generated profiles).
        CODE_SIGN_ENTITLEMENTS: Sources/Entitlements-iOS.entitlements
    scheme:
      testTargets:
        - NautiHuskyTempTests-iOS
        - NautiHuskyTempUITests-iOS
      gatherCoverageData: true
  NautiHuskyTemp-watchOS:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources
        excludes:
          - "Info-macOS.plist"
          - "Info-iOS.plist"
          - "NautiHuskyTemp.entitlements"
          - "Entitlements-iOS.entitlements"
          - "ContentView.swift"
    dependencies:
      - target: NautiHuskyTempWidget-watchOS
        embed: true
    info:
      path: Sources/Info-watchOS.plist
      properties:
        CFBundleDisplayName: Nauti Husky
        WKApplication: true
        WKWatchOnly: true
        NSLocationWhenInUseUsageDescription: "Used to find swim spots and water conditions near you."
    settings:
      base:
        PRODUCT_NAME: "Nauti Husky"
        PRODUCT_BUNDLE_IDENTIFIER: net.botelle.NautiHuskyTemp.watch
        PRODUCT_MODULE_NAME: NautiHuskyTemp
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: Sources/Entitlements-watchOS.entitlements
    scheme:
      testTargets:
        - NautiHuskyTempTests-watchOS
      gatherCoverageData: true

  # --- Unit-test bundles (shared logic tests under Tests/) ---------------------
  NautiHuskyTempTests-iOS:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: NautiHuskyTemp-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.botelle.NautiHuskyTempTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        # App PRODUCT_NAME has spaces, so point the host at the real product path.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nauti Husky.app/Nauti Husky"
        BUNDLE_LOADER: "$(TEST_HOST)"

  NautiHuskyTempTests-watchOS:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Tests
    dependencies:
      - target: NautiHuskyTemp-watchOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.botelle.NautiHuskyTempTests.watch
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        # App PRODUCT_NAME has spaces, so point the host at the real product path.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Nauti Husky.app/Nauti Husky"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # --- UI driving (XCUITest, iOS only — watchOS has no UI testing) -------------
  NautiHuskyTempUITests-iOS:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: NautiHuskyTemp-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.botelle.NautiHuskyTempUITests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

  NautiHuskyTempWidget-iOS:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widgets
        excludes:
          - "Info-iOS.plist"
          - "Info-watchOS.plist"
          - "Widget-iOS.entitlements"
          - "Widget-watchOS.entitlements"
      - path: Sources/SharedSnapshot.swift
    info:
      path: Widgets/Info-iOS.plist
      properties:
        CFBundleDisplayName: Nauti Husky
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: NautiHuskyTempWidget
        # Extension bundle id must be prefixed by the app's (org.botelle.SwimTime).
        PRODUCT_BUNDLE_IDENTIFIER: org.botelle.SwimTime.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Widgets/Widget-iOS.entitlements

  NautiHuskyTempWidget-watchOS:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Widgets
        excludes:
          - "Info-iOS.plist"
          - "Info-watchOS.plist"
          - "Widget-iOS.entitlements"
          - "Widget-watchOS.entitlements"
      - path: Sources/SharedSnapshot.swift
    info:
      path: Widgets/Info-watchOS.plist
      properties:
        CFBundleDisplayName: Nauti Husky
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: NautiHuskyTempWidgetWatch
        PRODUCT_BUNDLE_IDENTIFIER: net.botelle.NautiHuskyTemp.watch.widget
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: Widgets/Widget-watchOS.entitlements
